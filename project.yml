name: YKMarkdown
options:
  deploymentTarget:
    macOS: 15.4
settings:
  base:
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_VERSION: 6.0

schemes:
  YKMarkdown:
    shared: true
    build:
      targets:
        YKMarkdown: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - YKMarkdownTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  YKMarkdown:
    type: application
    platform: macOS
    bundleId: com.yakamoz.YKMarkdown
    sources:
      - path: Sources
        type: syncedFolder
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.yakamoz.YKMarkdown
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0

  YKMarkdownTests:
    type: bundle.unit-test
    platform: macOS
    bundleId: com.yakamoz.YKMarkdown.Tests
    sources:
      - path: Tests
        type: syncedFolder
    settings:
      base:
        INFOPLIST_FILE: Tests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.yakamoz.YKMarkdown.Tests
    dependencies:
      - target: YKMarkdown
